<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" width="900" height="390">
<style>
/* light */
.bg   { fill: #f6f8fa; }
.surf { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
.grid { stroke: #eaeef2; stroke-width: 1; }
.ax   { stroke: #d0d7de; stroke-width: 1; }
.ttl  { font: 600 13px system-ui,sans-serif; fill: #1f2328; }
.sub  { font: 11px system-ui,sans-serif;     fill: #656d76; }
.lbl  { font: 10.5px ui-monospace,monospace; fill: #656d76;
        font-variant-numeric: tabular-nums; }
.albl { font: 10px system-ui,sans-serif; fill: #656d76; letter-spacing:.04em; text-transform:uppercase; }
.ltxt { font: 11.5px system-ui,sans-serif; fill: #1f2328; }

/* series */
.l-pt  { stroke: #cf4500; stroke-width: 2;   fill: none; }
.l-co  { stroke: #b56b00; stroke-width: 2;   fill: none; stroke-dasharray:5,3; }
.l-tr  { stroke: #1a56db; stroke-width: 2.5; fill: none; }
.l-sp  { stroke: #1a56db; stroke-width: 2.5; fill: none; }
.a-pt  { fill: rgba(207,69,0,.07);   stroke:none; }
.a-co  { fill: rgba(181,107,0,.06);  stroke:none; }
.a-tr  { fill: rgba(26,86,219,.09);  stroke:none; }
.a-sp  { fill: rgba(26,86,219,.08);  stroke:none; }
.d-pt  { fill: #cf4500; }
.d-co  { fill: #b56b00; }
.d-tr  { fill: #1a56db; }
.d-sp  { fill: #1a56db; }
.ref   { stroke: #b0b8c1; stroke-width:1; stroke-dasharray:3,3; fill:none; }
.peak  { font: bold 11px ui-monospace,monospace; fill: #1a56db; }

@media (prefers-color-scheme: dark) {
  .bg   { fill: #0d1117; }
  .surf { fill: #161b22; stroke: #30363d; }
  .grid { stroke: #21262d; }
  .ax   { stroke: #30363d; }
  .ttl  { fill: #e6edf3; }
  .sub  { fill: #8b949e; }
  .lbl  { fill: #8b949e; }
  .albl { fill: #8b949e; }
  .ltxt { fill: #e6edf3; }
  .l-pt { stroke: #f78166; }
  .l-co { stroke: #d29922; }
  .l-tr { stroke: #58a6ff; }
  .l-sp { stroke: #58a6ff; }
  .a-pt { fill: rgba(247,129,102,.08); }
  .a-co { fill: rgba(210,153,34,.07);  }
  .a-tr { fill: rgba(88,166,255,.10);  }
  .a-sp { fill: rgba(88,166,255,.09);  }
  .d-pt { fill: #f78166; }
  .d-co { fill: #d29922; }
  .d-tr { fill: #58a6ff; }
  .d-sp { fill: #58a6ff; }
  .ref  { stroke: #484f58; }
  .peak { fill: #58a6ff; }
}
</style>
