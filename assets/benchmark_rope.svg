<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
<style>
.bg   { fill: #f6f8fa; }
.surf { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
.grid { stroke: #eaeef2; stroke-width: 1; }
.ttl  { font: 600 13px system-ui,sans-serif; fill: #1f2328; }
.sub  { font: 11px system-ui,sans-serif; fill: #656d76; }
.lbl  { font: 10.5px ui-monospace,monospace; fill: #656d76; font-variant-numeric: tabular-nums; }
.albl { font: 10px system-ui,sans-serif; fill: #656d76; letter-spacing:.04em; text-transform:uppercase; }
.ltxt { font: 11px system-ui,sans-serif; fill: #1f2328; }
.peak { font: bold 11px ui-monospace,monospace; fill: #1a56db; }
.note { font: 10px system-ui,sans-serif; fill: #656d76; font-style: italic; }

.l-pt { stroke: #cf4500; stroke-width: 2;   fill: none; }
.l-co { stroke: #b56b00; stroke-width: 2;   fill: none; stroke-dasharray:5,3; }
.l-cx { stroke: #6f42c1; stroke-width: 2;   fill: none; stroke-dasharray:2,3; }
.l-tr { stroke: #1a56db; stroke-width: 2.5; fill: none; }
.a-tr { fill: rgba(26,86,219,.08); stroke: none; }
.d-pt { fill: #cf4500; } .d-co { fill: #b56b00; }
.d-cx { fill: #6f42c1; } .d-tr { fill: #1a56db; }

.l-svpt { stroke: #1a56db; stroke-width: 2.5; fill: none; }
.l-svcx { stroke: #6f42c1; stroke-width: 2;   fill: none; stroke-dasharray:5,3; }
.a-svpt { fill: rgba(26,86,219,.08); stroke: none; }
.a-svcx { fill: rgba(111,66,193,.07); stroke: none; }
.d-svpt { fill: #1a56db; } .d-svcx { fill: #6f42c1; }

@media (prefers-color-scheme: dark) {
  .bg   { fill: #0d1117; } .surf { fill: #161b22; stroke: #30363d; }
  .grid { stroke: #21262d; } .ttl { fill: #e6edf3; } .sub { fill: #8b949e; }
  .lbl  { fill: #8b949e; } .albl { fill: #8b949e; } .ltxt { fill: #e6edf3; }
  .note { fill: #8b949e; } .peak { fill: #58a6ff; }
  .l-pt { stroke: #f78166; } .l-co { stroke: #d29922; }
  .l-cx { stroke: #bc8cff; } .l-tr { stroke: #58a6ff; }
  .a-tr { fill: rgba(88,166,255,.10); }
  .d-pt { fill: #f78166; } .d-co { fill: #d29922; }
  .d-cx { fill: #bc8cff; } .d-tr { fill: #58a6ff; }
  .l-svpt { stroke: #58a6ff; } .l-svcx { stroke: #bc8cff; }
  .a-svpt { fill: rgba(88,166,255,.10); } .a-svcx { fill: rgba(188,140,255,.08); }
  .d-svpt { fill: #58a6ff; } .d-svcx { fill: #bc8cff; }
}
</style>
