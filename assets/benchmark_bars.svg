<style>
.bg   { fill: #f6f8fa; }
.surf { fill: #ffffff; stroke: #d0d7de; stroke-width: 1; }
.grid { stroke: #eaeef2; stroke-width: 1; }
.ttl  { font: 600 13px system-ui,sans-serif; fill: #1f2328; }
.sub  { font: 11px system-ui,sans-serif; fill: #656d76; }
.lbl  { font: 10.5px ui-monospace,monospace; fill: #656d76; font-variant-numeric: tabular-nums; }
.albl { font: 10px system-ui,sans-serif; fill: #656d76; letter-spacing:.04em; text-transform:uppercase; }
.ltxt { font: 11px system-ui,sans-serif; fill: #1f2328; }
.vlbl { font: bold 9px ui-monospace,monospace; fill: #1f2328; }
.plbl { font: bold 10px ui-monospace,monospace; fill: #1a56db; }

.b-pt { fill: #cf4500; opacity:.85; }
.b-co { fill: #b56b00; opacity:.85; }
.b-cx { fill: #6f42c1; opacity:.85; }
.b-tr { fill: #1a56db; }
.b-sp { fill: #1a56db; }
.ref  { stroke: #b0b8c1; stroke-width:1; stroke-dasharray:3,3; }

@media (prefers-color-scheme: dark) {
  .bg   { fill: #0d1117; } .surf { fill: #161b22; stroke: #30363d; }
  .grid { stroke: #21262d; } .ttl { fill: #e6edf3; } .sub { fill: #8b949e; }
  .lbl  { fill: #8b949e; } .albl { fill: #8b949e; } .ltxt { fill: #e6edf3; }
  .vlbl { fill: #e6edf3; } .plbl { fill: #58a6ff; } .ref { stroke: #484f58; }
  .b-pt { fill: #f78166; } .b-co { fill: #d29922; }
  .b-cx { fill: #bc8cff; } .b-tr { fill: #388bfd; } .b-sp { fill: #388bfd; }
}
</style>
