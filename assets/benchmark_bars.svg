.vlbl { font: bold 9.5px ui-monospace,monospace; fill: #1f2328; }
.plbl { font: bold 10px ui-monospace,monospace; fill: #1a56db; }

.b-pt { fill: #cf4500; opacity:.85; }
.b-co { fill: #b56b00; opacity:.85; }
.b-tr { fill: #1a56db; opacity:.9; }
.b-sp { fill: #1a56db; }

.ref  { stroke: #b0b8c1; stroke-width:1; stroke-dasharray:3,3; }

@media (prefers-color-scheme: dark) {
  .bg   { fill: #0d1117; }
